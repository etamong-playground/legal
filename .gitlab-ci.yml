# @etamong-lab/legal — build on every push/MR, publish to the project's GitLab
# npm registry on a semver tag (vX.Y.Z). Publish auth uses the built-in
# CI_JOB_TOKEN — no Vault secret, so this repo needs no terraform CI vars.
stages:
  - build
  - publish

default:
  image: node:20-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.12.4 --activate

build:
  stage: build
  script:
    - pnpm install --frozen-lockfile
    - pnpm typecheck
    - pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

publish:
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - pnpm install --frozen-lockfile
    - pnpm build
    - |
      {
        echo "@etamong-lab:registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
        echo "//gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}"
      } > .npmrc
    - npm publish
