name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Publish to GitHub Packages (@etamong-playground)
        run: |
          # Rewrite scope for GitHub Packages
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = pkg.name.replace('@etamong-lab/', '@etamong-playground/');
            delete pkg.publishConfig;
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package.json name for Forgejo publish
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = pkg.name.replace('@etamong-playground/', '@etamong-lab/');
            delete pkg.publishConfig;
            pkg.publishConfig = { registry: 'https://git.m.etamong.com/api/packages/etamong-playground/npm/', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to Forgejo Packages (@etamong-lab)
        run: |
          npm publish --registry https://git.m.etamong.com/api/packages/etamong-playground/npm/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FORGEJO_NPM_TOKEN }}
